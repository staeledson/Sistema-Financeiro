name: CI

on:
  push:
    branches: [main, fase-0-fundacao, fase-1-nucleo-financeiro, fase-2-ingestao-ia]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://app:app@localhost:5432/financas
  REDIS_URL: redis://localhost:6379

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: financas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: pnpm exec prisma generate

      - name: Run migrations
        run: pnpm exec prisma migrate deploy

      - name: Test api
        run: pnpm --filter @app/api test run

      - name: Test worker
        run: pnpm --filter @app/worker test run

      - name: Test web
        run: pnpm --filter @app/web test run
